<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.1//EN" "http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd">
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <title>电梯状态监控页面</title>
        <link rel="stylesheet" type="text/css" href="static/css/main.css">
    </head>
    <body>
        <div class="card">
            <div class="card-title b-light b-b">
                <div class="font-thin h5">
                    电梯ID：<span id="device">获取中</span>
                </div>
                <div class="font-thin h5">
                    最后更新时间：<span id="lastUpdateTime">正在获取数据中</span>
                </div>
            </div>
            <div class="card-main">
                <div class="card-main-harf b-light b-r">
                    <div class="card-floor-show">
                        <div class="card-floor-show-floortext">
                            <span style="width:10px;" id="direction">-</span> <span id="floor">00</span>
                        </div>
                        <div class="card-floor-show-tofloortext">
                            目标层：<span id="toFloor">00</span>
                        </div>
                    </div>
                    <div class="card-floor-info b-light b-t">
                        <div class="card-floor-info-card b-light b-r">
                            <span class="card-floor-info-card-title">状态</span>
                            <div class="font-thin h2"><span id="status-text">获取中</span></div>
                        </div>
                        <div class="card-floor-info-card">
                            <span class="card-floor-info-card-title">厢门</span>
                            <div class="font-thin h2"><span id="door">获取中</span></div>
                        </div>
                    </div>
                    <div class="card-floor-info b-light b-t b-b">
                        <div class="card-floor-info-card b-light b-r">
                            <span class="card-floor-info-card-title">乘客</span>
                            <div class="font-thin h2"><span id="passenger">获取中</span></div>
                        </div>
                        <div class="card-floor-info-card">
                            <span class="card-floor-info-card-title">速度</span>
                            <div class="font-thin h2"><span id="speed">获取中</span></div>
                        </div>
                    </div>
                </div>
                <div class="card-main-harf">
                    <ul class="list-group list-group-lg m-b-none">
                        <li class="list-group-item font-thin" id="alarm_00">
                            <span class="list-group-item-status" id="alarm_00_text">○</span>
                            <span class="list-group-item-text">困人</span>
                        </li>
                        <li class="list-group-item font-thin" id="alarm_01">
                            <span class="list-group-item-status" id="alarm_01_text">○</span>
                            <span class="list-group-item-text">超速运行</span>
                        </li>
                        <li class="list-group-item font-thin" id="alarm_02">
                            <span class="list-group-item-status" id="alarm_02_text">○</span>
                            <span class="list-group-item-text">挡板上移</span>
                        </li>
                        <li class="list-group-item font-thin" id="alarm_03">
                            <span class="list-group-item-status" id="alarm_03_text">○</span>
                            <span class="list-group-item-text">挡板下移</span>
                        </li>
                        <li class="list-group-item font-thin" id="alarm_04">
                            <span class="list-group-item-status" id="alarm_04_text">○</span>
                            <span class="list-group-item-text">蹲底</span>
                        </li>
                        <li class="list-group-item font-thin" id="alarm_05">
                            <span class="list-group-item-status" id="alarm_05_text">○</span>
                            <span class="list-group-item-text">关门超时</span>
                        </li>
                        <li class="list-group-item font-thin" id="alarm_06">
                            <span class="list-group-item-status" id="alarm_06_text">○</span>
                            <span class="list-group-item-text">开门载人运行</span>
                        </li>
                        <li class="list-group-item font-thin" id="alarm_07">
                            <span class="list-group-item-status" id="alarm_07_text">○</span>
                            <span class="list-group-item-text">检修状态</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </body>

    <script>
        var host = location.host;
        var wsUrl = 'ws://' + host + '/ws';
        var reconnectDelay = 2000;
        var maxReconnectDelay = 30000;
        var c = null;

        var device = document.getElementById("device");
        var lastUpdateTime = document.getElementById("lastUpdateTime");
        var floor = document.getElementById("floor");
        var toFloor = document.getElementById("toFloor");
        var direction = document.getElementById("direction");
        var door = document.getElementById("door");
        var status_text = document.getElementById("status-text");
        var passenger = document.getElementById("passenger");
        var speed = document.getElementById("speed");

        var ALARM_MAP = {
            "00": 0, "01": 1, "02": 2, "03": 3,
            "04": 4, "05": 5, "06": 6, "07": 7
        };

        function connectWebSocket() {
            if (c != null) { try { c.close(); } catch(e) {} }
            c = new WebSocket(wsUrl);

            c.onopen = function() {
                status_text.innerHTML = "已连接";
                lastUpdateTime.innerHTML = dateFtt("yyyy-MM-dd hh:mm:ss", new Date());
                reconnectDelay = 2000;
            };

            c.onmessage = function(msg) {
                try {
                    var obj = JSON.parse(msg.data);
                    updateDisplay(obj);
                } catch(e) {}
            };

            c.onclose = function(evt) {
                status_text.innerHTML = "连接断开，重连中...";
                setTimeout(connectWebSocket, reconnectDelay);
                reconnectDelay = Math.min(reconnectDelay * 2, maxReconnectDelay);
            };
        }

        function updateDisplay(obj) {
            device.innerHTML = obj.Device || "";
            floor.innerHTML = obj.Floor || "00";
            toFloor.innerHTML = obj.ToFloor || "00";
            speed.innerHTML = obj.Speed || "";

            switch(obj.Status) {
                case "00": status_text.innerHTML = "正常"; break;
                case "01": status_text.innerHTML = "异常"; break;
                case "02": status_text.innerHTML = "未知"; break;
                default: status_text.innerHTML = obj.Status || "未知"; break;
            }

            switch(obj.Direction) {
                case "00": direction.innerHTML = " "; break;
                case "01": direction.innerHTML = "▲"; break;
                case "02": direction.innerHTML = "▼"; break;
                default: direction.innerHTML = obj.Direction || "-"; break;
            }

            switch(obj.Door) {
                case "00": door.innerHTML = "关门到位"; break;
                case "01": door.innerHTML = "开门到位"; break;
                case "02": door.innerHTML = "关门中"; break;
                case "03": door.innerHTML = "开门中"; break;
                default: door.innerHTML = obj.Door || "未知"; break;
            }

            switch(obj.Passenger) {
                case "00": passenger.innerHTML = "无乘客"; break;
                case "01": passenger.innerHTML = "有乘客"; break;
                default: passenger.innerHTML = obj.Passenger || ""; break;
            }

            // 告警匹配
            resetAllAlarms();
            var alarmStr = obj.Alarm || "";
            if (alarmStr) {
                var matched = false;
                for (var code in ALARM_MAP) {
                    if (alarmStr.indexOf(code) > -1) {
                        setAlarmOn(ALARM_MAP[code]);
                        matched = true;
                    }
                }
                if (!matched) {
                    if (alarmStr.indexOf("LEVELING") > -1 || alarmStr.indexOf("TIMEOUT") > -1) setAlarmOn(0);
                    if (alarmStr.indexOf("SPEED") > -1) setAlarmOn(1);
                    if (alarmStr.indexOf("FLOOR_JUMP") > -1) setAlarmOn(0);
                }
            }

            lastUpdateTime.innerHTML = dateFtt("yyyy-MM-dd hh:mm:ss", new Date());
        }

        function resetAllAlarms() {
            for (var i = 0; i < 8; i++) {
                var alarmNum = (i < 10) ? "0" + i : "" + i;
                var el = document.getElementById("alarm_" + alarmNum);
                var tx = document.getElementById("alarm_" + alarmNum + "_text");
                if (el) el.className = "list-group-item font-thin";
                if (tx) tx.innerText = "○";
            }
            if (speed) speed.className = "font-thin h2";
        }

        function setAlarmOn(index) {
            var alarmNum = (index < 10) ? "0" + index : "" + index;
            var el = document.getElementById("alarm_" + alarmNum);
            var tx = document.getElementById("alarm_" + alarmNum + "_text");
            if (el) el.className = "list-group-item font-thin list-group-item-alarm";
            if (tx) tx.innerText = "☉";
            if (index === 1 && speed) speed.className = "font-thin h2 list-group-item-alarm";
        }

        function dateFtt(fmt, date) {
            var o = {
                "M+" : date.getMonth()+1,
                "d+" : date.getDate(),
                "h+" : date.getHours(),
                "m+" : date.getMinutes(),
                "s+" : date.getSeconds(),
                "q+" : Math.floor((date.getMonth()+3)/3),
                "S"  : date.getMilliseconds()
            };
            if(/(y+)/.test(fmt))
                fmt = fmt.replace(RegExp.$1, (date.getFullYear()+"").substr(4 - RegExp.$1.length));
            for(var k in o)
                if(new RegExp("("+ k +")").test(fmt))
                    fmt = fmt.replace(RegExp.$1, (RegExp.$1.length==1) ? (o[k]) : (("00"+ o[k]).substr((""+ o[k]).length)));
            return fmt;
        }

        connectWebSocket();
    </script>
</html>
        };
    </script>
</html>
